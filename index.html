<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HydroSmart | Elite Hydration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2dd4bf;
            --secondary: #0891b2;
            --bg: #050505;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: white;
            /* Fixed mobile scroll: hide horizontal, allow vertical */
            overflow-x: hidden;
            overflow-y: auto; 
            background: radial-gradient(circle at 50% 100%, #134e4a 0%, #050505 100%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        /* Glassmorphism Bottle */
        .bottle-frame {
            position: relative;
            width: 170px;
            height: 320px;
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 100%);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 70px;
            backdrop-filter: blur(15px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            z-index: 10;
        }

        .liquid-core {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(180deg, var(--primary) 0%, var(--secondary) 100%);
            transition: height 1s cubic-bezier(0.65, 0, 0.35, 1);
            box-shadow: 0 0 40px rgba(45, 212, 191, 0.3);
        }

        /* Organic Wave Animation */
        .liquid-core::before {
            content: "";
            position: absolute;
            top: -20px;
            left: -50%;
            width: 200%;
            height: 40px;
            background: var(--primary);
            border-radius: 38%;
            animation: slosh 6s infinite linear;
        }

        @keyframes slosh {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Ambient Bubbles */
        .bubble {
            position: fixed;
            background: white;
            border-radius: 50%;
            opacity: 0.05;
            pointer-events: none;
            animation: float-up 12s infinite ease-in;
            z-index: 0;
        }

        @keyframes float-up {
            0% { transform: translateY(110vh) scale(0); opacity: 0; }
            50% { opacity: 0.1; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        .glass-stat {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
        }

        .btn-glow {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px -5px rgba(45, 212, 191, 0.3);
        }

        .btn-glow:active { transform: scale(0.95); }
    </style>
</head>
<body class="pb-10">

    <div id="bubble-field"></div>

    <nav class="relative z-50 flex justify-between items-center px-6 md:px-20 py-10">
        <div class="font-black text-2xl tracking-tighter text-emerald-400 uppercase">
            Hydro<span class="text-white">Smart</span>
        </div>
        <button class="bg-white/10 hover:bg-white/20 border border-white/20 text-white font-bold py-2 px-6 rounded-full text-[10px] uppercase tracking-widest transition-all">
            Connect
        </button>
    </nav>

    <main class="container mx-auto px-6 grid lg:grid-cols-2 gap-16 items-center">
        
        <!-- Copy Section -->
        <div class="space-y-8 order-2 lg:order-1">
            <div class="space-y-2">
                <p class="text-emerald-400 font-bold tracking-[0.4em] text-[10px] md:text-xs uppercase">Biological Synchronization</p>
                <h1 class="text-5xl md:text-8xl font-black leading-[0.95] tracking-tight">
                    The Bottle that <br>
                    <span class="text-transparent bg-clip-text bg-gradient-to-r from-emerald-300 to-cyan-500 uppercase">Heals You.</span>
                </h1>
            </div>

            <p class="text-gray-400 text-lg md:text-xl max-w-md leading-relaxed font-light">
                Elite hydration tracking. Reach your 2000ml goal to achieve a <b>Hydrated</b> status and initiate the system reset.
            </p>
            
            <div class="flex flex-col sm:flex-row items-start sm:items-center space-y-6 sm:space-y-0 sm:space-x-8">
                <button id="sip-btn" onclick="sipWater()" class="btn-glow bg-emerald-500 text-black py-5 px-10 rounded-2xl font-black uppercase tracking-widest text-sm w-full sm:w-auto">
                    Simulate 250ml Sip
                </button>
                <div class="flex flex-col">
                    <span class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Progress</span>
                    <span id="perc-label" class="text-3xl font-black">0%</span>
                </div>
            </div>
        </div>

        <!-- Visual Section -->
        <div class="flex flex-col items-center order-1 lg:order-2">
            <div class="bottle-frame">
                <div id="liquid" class="liquid-core" style="height: 0%;"></div>
            </div>
            
            <div class="mt-12 grid grid-cols-3 gap-3 md:gap-4 w-full max-w-md">
                <div class="glass-stat p-6 rounded-[2.5rem] text-center">
                    <p class="text-[9px] text-gray-500 uppercase font-bold tracking-widest mb-1">Intake</p>
                    <p class="text-xl md:text-2xl font-black"><span id="intake-val">0</span><span class="text-[10px] text-gray-500 ml-1">ml</span></p>
                </div>
                <div class="glass-stat p-6 rounded-[2.5rem] text-center col-span-2 flex items-center justify-between px-8">
                    <div class="text-left">
                        <p class="text-[9px] text-gray-500 uppercase font-bold tracking-widest mb-1">Status</p>
                        <p id="status-val" class="text-lg md:text-xl font-black text-gray-600 uppercase">Empty</p>
                    </div>
                    <div id="status-dot" class="w-3 h-3 bg-gray-700 rounded-full animate-pulse"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let currentIntake = 0;
        const goal = 2000;
        let isLocked = false;

        // Generate Ambient Particles
        const field = document.getElementById('bubble-field');
        for(let i=0; i<15; i++) {
            const b = document.createElement('div');
            b.className = 'bubble';
            const size = Math.random() * 25 + 5 + 'px';
            b.style.width = size; b.style.height = size;
            b.style.left = Math.random() * 100 + 'vw';
            b.style.animationDelay = Math.random() * 8 + 's';
            field.appendChild(b);
        }

        function sipWater() {
            if (isLocked) return;

            currentIntake += 250;
            if (currentIntake >= goal) {
                currentIntake = goal;
                updateUI();
                autoReset();
            } else {
                updateUI();
            }
        }

        function updateUI() {
            const perc = (currentIntake / goal) * 100;
            const liquid = document.getElementById('liquid');
            const intakeTxt = document.getElementById('intake-val');
            const statusTxt = document.getElementById('status-val');
            const statusDot = document.getElementById('status-dot');
            const percLabel = document.getElementById('perc-label');

            liquid.style.height = perc + '%';
            intakeTxt.innerText = currentIntake;
            percLabel.innerText = Math.round(perc) + '%';

            if (currentIntake >= goal) {
                statusTxt.innerText = "Hydrated";
                statusTxt.className = "text-lg md:text-xl font-black text-emerald-400 uppercase";
                statusDot.className = "w-3 h-3 bg-emerald-400 rounded-full shadow-[0_0_15px_rgba(16,185,129,0.6)]";
            } else if (currentIntake === 0) {
                statusTxt.innerText = "Empty";
                statusTxt.className = "text-lg md:text-xl font-black text-gray-600 uppercase";
                statusDot.className = "w-3 h-3 bg-gray-700 rounded-full animate-pulse";
            } else {
                statusTxt.innerText = "Drinking";
                statusTxt.className = "text-lg md:text-xl font-black text-cyan-400 uppercase";
                statusDot.className = "w-3 h-3 bg-cyan-400 rounded-full animate-ping";
            }
        }

        function autoReset() {
            isLocked = true;
            const btn = document.getElementById('sip-btn');
            btn.innerText = "Goal Achieved";
            btn.style.background = "#fff";

            // Wait 3 seconds to celebrate the Hydrated status
            setTimeout(() => {
                currentIntake = 0;
                updateUI();
                
                // Allow interactions after bottle is visually empty
                setTimeout(() => {
                    isLocked = false;
                    btn.innerText = "Simulate 250ml Sip";
                    btn.style.background = "";
                }, 1000);
            }, 3000);
        }
    </script>
</body>
</html>
